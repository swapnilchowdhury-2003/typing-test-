<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Tortile Tech logo</title>
  <desc id="desc">A smiling green turtle typing on a keyboard with glowing blue and teal rings behind it.</desc>
  <defs>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#59f3d0"/>
      <stop offset="50%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#75d7ff"/>
    </linearGradient>
    <linearGradient id="shellGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b9f7a6"/>
      <stop offset="100%" stop-color="#79d86a"/>
    </linearGradient>
    <linearGradient id="bodyGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4ffb3"/>
      <stop offset="100%" stop-color="#84d96c"/>
    </linearGradient>
    <radialGradient id="softGlow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#7dfad4" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#7dfad4" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b1a24" flood-opacity="0.75"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="84" fill="#0e0e14"/>
  <circle cx="256" cy="214" r="150" fill="url(#softGlow)"/>
  <circle cx="256" cy="214" r="144" fill="none" stroke="url(#bgGlow)" stroke-width="16" opacity="0.95" filter="url(#glow)"/>
  <circle cx="300" cy="204" r="110" fill="none" stroke="url(#bgGlow)" stroke-width="14" opacity="0.6"/>

  <g filter="url(#shadow)">
    <ellipse cx="253" cy="244" rx="92" ry="86" fill="url(#shellGlow)" stroke="#1f3f2e" stroke-width="10"/>
    <ellipse cx="315" cy="226" rx="74" ry="72" fill="none" stroke="url(#bgGlow)" stroke-width="12" opacity="0.55"/>
    <ellipse cx="326" cy="224" rx="62" ry="60" fill="none" stroke="#a7dfff" stroke-width="4" opacity="0.2"/>

    <path d="M190 260c0-58 34-108 88-108 50 0 88 40 88 92 0 56-34 90-78 90-57 0-98-28-98-74z" fill="url(#bodyGlow)" stroke="#1f3f2e" stroke-width="8"/>
    <path d="M252 152c-26 8-47 27-58 52 18 13 44 20 74 20 26 0 49-5 68-14-5-26-19-46-40-58-12-7-26-10-44-10z" fill="#e3ffd1" opacity="0.55"/>

    <ellipse cx="257" cy="176" rx="61" ry="58" fill="url(#bodyGlow)" stroke="#1f3f2e" stroke-width="8"/>
    <circle cx="233" cy="160" r="8" fill="#0e0e14"/>
    <circle cx="281" cy="160" r="8" fill="#0e0e14"/>
    <circle cx="236" cy="155" r="3" fill="#ffffff" opacity="0.75"/>
    <circle cx="284" cy="155" r="3" fill="#ffffff" opacity="0.75"/>
    <path d="M237 181c7 8 31 8 38 0" fill="none" stroke="#0e0e14" stroke-width="7" stroke-linecap="round"/>
    <path d="M224 148c4-8 13-12 23-13" fill="none" stroke="#f7ffd9" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

    <path d="M345 224c-8-10-21-14-36-11" fill="none" stroke="#1f3f2e" stroke-width="8" stroke-linecap="round"/>
    <path d="M340 229c-3-12-10-19-22-23" fill="none" stroke="#89d6b4" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

    <g fill="url(#bodyGlow)" stroke="#1f3f2e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M196 268c-21 7-38 22-44 41 17 7 36 6 52-2 8-4 15-9 22-16-10-12-19-19-30-23z"/>
      <path d="M297 282c13 5 26 15 37 29 15-4 28-13 37-27-8-17-25-28-46-30-13 6-24 15-28 28z"/>
      <path d="M185 324c-15 8-26 18-31 31 11 9 24 13 39 12 11-1 20-5 28-12-7-11-14-21-23-31-4-4-9-5-13 0z"/>
      <path d="M321 327c-10 9-17 18-22 29 8 8 18 13 29 14 16 1 30-4 41-14-6-14-18-25-33-34-6-3-11-2-15 5z"/>
    </g>

    <g transform="translate(0 8)">
