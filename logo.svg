      <path d="M144 385h230" stroke="#88a3bf" stroke-width="6" opacity="0.7"/>
      <path d="M146 403h226" stroke="#88a3bf" stroke-width="4" opacity="0.5"/>
      <g>
        <rect x="136" y="372" width="26" height="24" rx="5" fill="#ffffff"/>
        <rect x="166" y="372" width="26" height="24" rx="5" fill="#b7c8db"/>
        <rect x="196" y="372" width="26" height="24" rx="5" fill="#ffffff"/>
        <rect x="226" y="372" width="26" height="24" rx="5" fill="#b7c8db"/>
        <rect x="256" y="372" width="26" height="24" rx="5" fill="#ffffff"/>
        <rect x="286" y="372" width="26" height="24" rx="5" fill="#b7c8db"/>
        <rect x="316" y="372" width="26" height="24" rx="5" fill="#ffffff"/>
        <rect x="346" y="372" width="26" height="24" rx="5" fill="#93e6bb"/>

        <rect x="154" y="398" width="26" height="24" rx="5" fill="#b7c8db"/>
        <rect x="184" y="398" width="26" height="24" rx="5" fill="#ffffff"/>
        <rect x="214" y="398" width="26" height="24" rx="5" fill="#b7c8db"/>
        <rect x="244" y="398" width="26" height="24" rx="5" fill="#ffffff"/>
        <rect x="274" y="398" width="26" height="24" rx="5" fill="#b7c8db"/>
        <rect x="304" y="398" width="26" height="24" rx="5" fill="#ffffff"/>
        <rect x="334" y="398" width="36" height="24" rx="5" fill="#93e6bb"/>
      </g>
      <g fill="#6f7f95" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle" dominant-baseline="middle">
        <text x="149" y="384">T</text>
        <text x="179" y="384">O</text>
        <text x="209" y="384">R</text>
        <text x="239" y="384">T</text>
        <text x="269" y="384">I</text>
        <text x="299" y="384">L</text>
        <text x="329" y="384">E</text>
        <text x="359" y="384">T</text>
        <text x="167" y="410">E</text>
        <text x="197" y="410">C</text>
        <text x="227" y="410">H</text>
      </g>
    </g>
  </g>

  <g opacity="0.95" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="256" y="472" font-size="40" font-weight="700" fill="url(#bgGlow)">TORTILE TECH</text>
    <text x="256" y="506" font-size="20" letter-spacing="3" fill="#c7cfdd">DIGITAL SOLUTIONS</text>
  </g>
</svg>
